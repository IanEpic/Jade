function checkAll(form){
	if (form.allcats.options[form.allcats.selectedIndex].value==1) {
		for (i = 0; i < form.categories.length; i++) {
			form.categories[i].checked = true ;
	    }
	}
}

function checkAddress(form){
	if (form.streetaddressid) {
	if (form.streetaddressid.options[form.streetaddressid.selectedIndex].value=='b') {
		form.streetaddress.disabled=false;
		form.streetcity.disabled=false;
		form.streetstate.disabled=false;
		form.streetcode.disabled=false;
		form.streetcountry.disabled=false;
	} else {
		form.streetaddress.disabled=true;
		form.streetcity.disabled=true;
		form.streetstate.disabled=true;
		form.streetcode.disabled=true;
		form.streetcountry.disabled=true;
	}}
	if (form.postaladdressid) {
	if (form.postaladdressid.options[form.postaladdressid.selectedIndex].value=='b') {
		form.postaladdress.disabled=false;
		form.postalcity.disabled=false;
		form.postalstate.disabled=false;
		form.postalcode.disabled=false;
		form.postalcountry.disabled=false;
	} else {
		form.postaladdress.disabled=true;
		form.postalcity.disabled=true;
		form.postalstate.disabled=true;
		form.postalcode.disabled=true;
		form.postalcountry.disabled=true;
	}}
}

function checkPostal(form){
	if (form.postaladdressid) {
	if (form.postaladdressid.options[form.postaladdressid.selectedIndex].value=='b') {
		form.postaladdress.disabled=false;
		form.postalcity.disabled=false;
		form.postalstate.disabled=false;
		form.postalcode.disabled=false;
		form.postalcountry.disabled=false;
	} else {
		form.postaladdress.disabled=true;
		form.postalcity.disabled=true;
		form.postalstate.disabled=true;
		form.postalcode.disabled=true;
		form.postalcountry.disabled=true;
	}}
}

function checkEntrant(form){
	if (form.entrantid.options[form.entrantid.selectedIndex].value=='b') {
		form.name.disabled=false;
		form.abn.disabled=false;
		form.type.disabled=false;
		form.legalentity.disabled=false;
		form.streetaddressid.disabled=false;
		form.postaladdressid.disabled=false;
		form.telephone.disabled=false;
		form.fax.disabled=false;
		form.mobile.disabled=false;
		form.email.disabled=false;
		checkAddress(form);
	} else {
		form.name.disabled=true;
		form.abn.disabled=true;
		form.type.disabled=true;
		form.legalentity.disabled=true;
		form.streetaddressid.disabled=true;
		form.postaladdressid.disabled=true;
		form.telephone.disabled=true;
		form.fax.disabled=true;
		form.mobile.disabled=true;
		form.email.disabled=true;
		form.postaladdress.disabled=true;
		form.postalcity.disabled=true;
		form.postalstate.disabled=true;
		form.postalcode.disabled=true;
		form.postalcountry.disabled=true;
		form.streetaddress.disabled=true;
		form.streetcity.disabled=true;
		form.streetstate.disabled=true;
		form.streetcode.disabled=true;
		form.streetcountry.disabled=true;
	}
}

function cnt(w,x){
		var y=w.value;
		var r = 0;
		a=y.replace(/\s/g,' ');
		a=a.split(' ');
		for (z=0; z<a.length; z++) {if (a[z].length > 0) r++;}
		x.value=r;
}

function setCheckedValue(radioObj, newValue) { 
 	if(!radioObj) return; 
	var radioLength = radioObj.length; 
	if(radioLength == undefined) { 
		radioObj.checked = (radioObj.value == newValue.toString()); 
		return; 
	} 
  	for(var i = 0; i < radioLength; i++) { 
  		radioObj[i].checked = false; 
  		if(radioObj[i].value == newValue.toString()) { 
  			radioObj[i].checked = true; 
		} 
  	} 
} 

function emptyTextArea(taObj) { 
 	if(!taObj) return;
	taObj.value=""; 
}
